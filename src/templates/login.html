<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Claude API Proxy</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111f;
            --panel: rgba(14, 25, 43, .92);
            --line: rgba(148, 163, 184, .17);
            --muted: #8ea1ba;
            --text: #edf4ff;
            --brand: #7c9cff;
            --brand-2: #53d7c4;
            --danger: #fb7185;
            --shadow: 0 30px 90px rgba(0, 0, 0, .35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 8%, rgba(83, 215, 196, .14), transparent 30rem),
                radial-gradient(circle at 92% 4%, rgba(124, 156, 255, .2), transparent 34rem),
                var(--bg);
            font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        button, input { font: inherit; }
        .shell {
            width: min(1080px, calc(100% - 32px));
            min-height: 100vh;
            margin: auto;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(360px, .72fr);
            gap: clamp(36px, 7vw, 90px);
            align-items: center;
            padding: 48px 0;
        }
        .intro { padding: 20px 0; }
        .brand { display: flex; align-items: center; gap: 13px; margin-bottom: 50px; }
        .logo {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            color: #07101c;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 12px 36px rgba(83, 215, 196, .22);
        }
        .brand strong, .brand span { display: block; }
        .brand strong { font-size: 16px; }
        .brand span { color: var(--muted); font-size: 12px; }
        .kicker {
            display: inline-flex;
            padding: 5px 10px;
            border: 1px solid rgba(124, 156, 255, .25);
            border-radius: 999px;
            color: #b9c8ff;
            background: rgba(124, 156, 255, .08);
            font-size: 12px;
            font-weight: 700;
        }
        h1 {
            max-width: 650px;
            margin: 20px 0 18px;
            font-size: clamp(38px, 6vw, 68px);
            line-height: 1.02;
            letter-spacing: -.055em;
        }
        .lead {
            max-width: 590px;
            margin: 0;
            color: var(--muted);
            font-size: clamp(15px, 2vw, 18px);
        }
        .services { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 32px; }
        .service {
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: #b8c7db;
            background: rgba(13, 26, 44, .62);
        }
        .login-card {
            position: relative;
            overflow: hidden;
            padding: clamp(26px, 5vw, 38px);
            border: 1px solid var(--line);
            border-radius: 24px;
            background: linear-gradient(155deg, rgba(18, 32, 54, .97), rgba(11, 21, 37, .96));
            box-shadow: var(--shadow);
        }
        .login-card::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            right: -90px;
            top: -100px;
            border-radius: 50%;
            background: rgba(124, 156, 255, .18);
            filter: blur(4px);
        }
        .login-card h2 { margin: 0 0 7px; font-size: 25px; letter-spacing: -.03em; }
        .subtitle { margin: 0 0 28px; color: var(--muted); }
        .field { display: grid; gap: 7px; margin-bottom: 17px; }
        label { color: #b2c1d5; font-size: 12px; font-weight: 750; }
        .input-wrap { position: relative; }
        input {
            width: 100%;
            min-height: 48px;
            padding: 11px 13px;
            border: 1px solid var(--line);
            border-radius: 12px;
            outline: none;
            color: var(--text);
            background: rgba(5, 14, 26, .78);
            transition: border-color .18s, box-shadow .18s;
        }
        input:focus {
            border-color: rgba(124, 156, 255, .78);
            box-shadow: 0 0 0 3px rgba(124, 156, 255, .1);
        }
        #password { padding-right: 70px; }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 8px;
            transform: translateY(-50%);
            padding: 6px 8px;
            border: 0;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
        }
        .submit {
            width: 100%;
            min-height: 48px;
            margin-top: 7px;
            border: 0;
            border-radius: 12px;
            color: #07111e;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            font-weight: 850;
            cursor: pointer;
            transition: transform .18s, filter .18s;
        }
        .submit:hover { transform: translateY(-1px); filter: brightness(1.06); }
        .submit:disabled { cursor: wait; filter: saturate(.45); transform: none; }
        .error {
            display: none;
            margin-bottom: 17px;
            padding: 10px 12px;
            border: 1px solid rgba(251, 113, 133, .3);
            border-radius: 11px;
            color: #ffd0d8;
            background: rgba(72, 20, 31, .72);
        }
        .error.show { display: block; }
        .hint { margin: 20px 0 0; color: #70849e; font-size: 12px; text-align: center; }
        .link-button {
            display: block;
            margin: 12px auto 0;
            border: 0;
            color: #b9c8ff;
            background: transparent;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none;
            place-items: center;
            padding: 18px;
            background: rgba(2, 8, 18, .72);
            backdrop-filter: blur(10px);
        }
        .modal.show { display: grid; }
        .dialog {
            width: min(420px, 100%);
            padding: 24px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #0d192b;
            box-shadow: var(--shadow);
        }
        .dialog h3 { margin: 0 0 8px; font-size: 20px; }
        .dialog p { margin: 0 0 18px; color: var(--muted); }
        .dialog .submit { width: auto; min-width: 96px; margin: 0; }
        @media (max-width: 800px) {
            .shell { grid-template-columns: 1fr; width: min(500px, calc(100% - 28px)); gap: 28px; padding: 28px 0; }
            .intro { padding-bottom: 0; }
            .brand { margin-bottom: 34px; }
            h1 { font-size: clamp(38px, 12vw, 58px); }
            .lead { font-size: 15px; }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="intro">
        <div class="brand">
            <div class="logo">C</div>
            <div><strong>Claude API Proxy</strong><span>统一服务控制台</span></div>
        </div>
        <span class="kicker">One tenant, one API key</span>
        <h1>接入多种 LLM 服务</h1>
        <p class="lead">统一管理租户、API Key、Relay 上游与 CodeBuddy 凭证。登录后即可进入你的服务工作区。</p>
        <div class="services">
            <span class="service">Relay 上游管理</span>
            <span class="service">CodeBuddy 凭证</span>
            <span class="service">统一认证</span>
        </div>
    </section>
    <section class="login-card">
        <h2>欢迎回来</h2>
        <p class="subtitle">{{LOGIN_SUBTITLE}}</p>
        <div class="error" id="error" role="alert"></div>
        <form id="loginForm" autocomplete="off">
            <div class="field">
                <label for="username">用户名</label>
                <input id="username" name="username" required autocomplete="off" data-lpignore="true" data-1p-ignore autofocus placeholder="请输入用户名">
            </div>
            <div class="field">
                <label for="password">密码</label>
                <div class="input-wrap">
                    <input id="password" name="password" type="password" required autocomplete="off" data-lpignore="true" data-1p-ignore placeholder="请输入密码">
                    <button class="toggle-password" type="button" id="togglePassword">显示</button>
                </div>
            </div>
            <button class="submit" id="submitButton" type="submit">登录控制台</button>
        </form>
        <button class="link-button" type="button" onclick="openForgotPassword()">忘记密码？</button>
        <p class="hint">{{AUTH_MODE_HINT}}</p>
    </section>
</main>
<div class="modal" id="forgotPasswordModal"><div class="dialog">
    <h3>忘记密码</h3>
    <p>这是邀请制系统。请联系你熟悉的管理员，由管理员在用户管理中重置密码。</p>
    <button class="submit" type="button" onclick="closeForgotPassword()">知道了</button>
</div></div>
<script>
const form=document.getElementById('loginForm');
const errorBox=document.getElementById('error');
const submitButton=document.getElementById('submitButton');
const passwordInput=document.getElementById('password');
document.getElementById('togglePassword').addEventListener('click',event=>{
    const show=passwordInput.type==='password';
    passwordInput.type=show?'text':'password';
    event.currentTarget.textContent=show?'隐藏':'显示';
});
function openForgotPassword(){document.getElementById('forgotPasswordModal').classList.add('show');}
function closeForgotPassword(){document.getElementById('forgotPasswordModal').classList.remove('show');}
function pageApiOrigin(){
    return '';
}
function apiUrl(path){
    if(/^https?:\/\//i.test(path))return path;
    if(path==='/login'||path.startsWith('/login?'))path='/api'+path;
    const origin=pageApiOrigin();
    return origin?origin+path:path;
}
form.addEventListener('submit',async event=>{
    event.preventDefault();
    errorBox.classList.remove('show');
    submitButton.disabled=true;
    submitButton.textContent='正在登录...';
    try{
        const response=await fetch(apiUrl('/login'),{
            method:'POST',
            credentials:'include',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                username:document.getElementById('username').value.trim(),
                password:passwordInput.value
            })
        });
        const data=await response.json();
        if(response.ok&&data.success){
            window.location.replace(data.redirect||'/dashboard#/relay');
            return;
        }
        throw new Error(data.error||'登录失败');
    }catch(error){
        errorBox.textContent=error.message==='Failed to fetch'?'无法连接到服务，请稍后重试':error.message;
        errorBox.classList.add('show');
        submitButton.disabled=false;
        submitButton.textContent='登录控制台';
    }
});
</script>
</body>
</html>
