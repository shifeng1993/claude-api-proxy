<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Copilot 管理面板</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #f5f7fa;
                color: #333;
                line-height: 1.6;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }
            header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px 30px;
                margin-bottom: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 16px;
                font-size: 0.85rem;
                opacity: 0.9;
            }
            .card {
                background: white;
                border-radius: 12px;
                padding: 24px;
                margin-bottom: 20px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }
            .card h2 {
                color: #667eea;
                margin-bottom: 16px;
                font-size: 1.15rem;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.3s ease;
                font-weight: 500;
            }
            .btn-primary {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
            }
            .btn-primary:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            }
            .btn-danger {
                background: #ef4444;
                color: white;
            }
            .btn-danger:hover {
                background: #dc2626;
            }
            .btn-secondary {
                background: #f3f4f6;
                color: #374151;
            }
            .btn-secondary:hover {
                background: #e5e7eb;
            }
            .btn-success {
                background: #10b981;
                color: white;
            }
            .btn-success:hover {
                background: #059669;
            }
            .btn-warning {
                background: #f59e0b;
                color: white;
            }
            .btn-warning:hover {
                background: #d97706;
            }
            .btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            .btn-small {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .loading {
                display: inline-block;
                width: 18px;
                height: 18px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid #667eea;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            .toast {
                position: fixed;
                bottom: 20px;
                right: 20px;
                padding: 14px 22px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.3s ease;
                z-index: 1000;
            }
            .toast.show {
                transform: translateY(0);
                opacity: 1;
            }
            .toast.success {
                background: #10b981;
            }
            .toast.error {
                background: #ef4444;
            }
            .empty-state {
                text-align: center;
                padding: 30px;
                color: #9ca3af;
            }
            .api-key-display {
                background: #f1f5f9;
                padding: 14px 18px;
                border-radius: 8px;
                font-family: monospace;
                font-size: 0.9rem;
                word-break: break-all;
                border: 2px solid #667eea;
                color: #374151;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .api-key-text {
                flex: 1;
                word-break: break-all;
            }
            .api-key-actions {
                display: flex;
                gap: 6px;
                flex-shrink: 0;
            }
            .btn-icon {
                padding: 6px 10px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 0.8rem;
                transition: all 0.2s;
                background: #e5e7eb;
                color: #374151;
            }
            .btn-icon:hover {
                background: #d1d5db;
            }
            .btn-icon.copy-success {
                background: #10b981;
                color: white;
            }
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 16px;
            }
            .stat-item {
                background: #f8fafc;
                border-radius: 8px;
                padding: 20px;
                text-align: center;
            }
            .stat-value {
                font-size: 2rem;
                font-weight: 700;
                color: #667eea;
                line-height: 1.2;
            }
            .stat-label {
                font-size: 0.85rem;
                color: #6b7280;
                margin-top: 6px;
            }
            .usage-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
            }
            .usage-card-header h2 {
                margin-bottom: 0;
            }
            .month-select {
                padding: 6px 12px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-size: 0.85rem;
                color: #374151;
                background: white;
                cursor: pointer;
                outline: none;
            }
            .month-select:focus {
                border-color: #667eea;
            }
            .chart-container {
                width: 100%;
                height: 280px;
                margin-top: 16px;
            }
            .chart-fallback {
                width: 100%;
                height: 100%;
                border: 1px solid #e5e7eb;
                border-radius: 8px;
                padding: 12px;
                background: #fff;
            }
            .chart-fallback-title {
                font-size: 0.9rem;
                font-weight: 600;
                color: #374151;
                margin-bottom: 8px;
            }
            .chart-fallback svg {
                display: block;
                width: 100%;
                height: 220px;
            }
            .chart-fallback-empty {
                height: 220px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #9ca3af;
                font-size: 0.85rem;
            }

            /* 使用指南样式 */
            .guide-steps {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .guide-step {
                display: flex;
                gap: 14px;
                align-items: flex-start;
            }
            .guide-step-num {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                font-weight: 700;
                font-size: 0.85rem;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .guide-step-body {
                flex: 1;
            }
            .guide-step-title {
                font-weight: 600;
                color: #1f2937;
                margin-bottom: 4px;
                font-size: 0.95rem;
            }
            .guide-step-desc {
                font-size: 0.85rem;
                color: #6b7280;
                line-height: 1.5;
            }
            .guide-step-desc code {
                background: #f1f5f9;
                padding: 1px 6px;
                border-radius: 4px;
                font-size: 0.82rem;
                color: #7c3aed;
            }
            .guide-code-block {
                position: relative;
                background: #1e293b;
                border-radius: 8px;
                margin-top: 8px;
                overflow: hidden;
            }
            .guide-code-block pre {
                margin: 0;
                padding: 14px 18px;
                padding-right: 48px;
                color: #e2e8f0;
                font-size: 0.82rem;
                font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
                line-height: 1.6;
                overflow-x: auto;
                white-space: pre;
            }
            .guide-copy-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                background: rgba(255, 255, 255, 0.1);
                color: #e2e8f0;
                border: none;
            }
            .guide-copy-btn:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            /* 认证样式 */
            .auth-box {
                background: #f8fafc;
                border: 2px dashed #cbd5e1;
                border-radius: 12px;
                padding: 30px;
                text-align: center;
            }
            .auth-box.active {
                border-color: #667eea;
                background: #eef2ff;
            }
            .auth-code {
                font-size: 2rem;
                font-weight: 700;
                letter-spacing: 4px;
                color: #667eea;
                background: #f8fafc;
                padding: 12px 24px;
                border-radius: 8px;
                display: inline-block;
                margin: 12px 0;
                font-family: 'Courier New', monospace;
                user-select: all;
            }
            .auth-link {
                display: inline-block;
                background: #667eea;
                color: white;
                padding: 10px 20px;
                border-radius: 8px;
                text-decoration: none;
                margin: 10px 0;
                word-break: break-all;
                font-size: 0.85rem;
            }
            .auth-link:hover {
                background: #5a67d8;
            }
            .user-info {
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .user-avatar {
                width: 48px;
                height: 48px;
                border-radius: 50%;
            }
            .user-details h3 {
                font-size: 1rem;
                color: #1f2937;
            }
            .user-details p {
                font-size: 0.85rem;
                color: #6b7280;
            }
            .status-badge {
                display: inline-block;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.75rem;
                font-weight: 500;
            }
            .status-badge.active {
                background: #d1fae5;
                color: #065f46;
            }
            .status-badge.expired {
                background: #fee2e2;
                color: #991b1b;
            }
            .status-badge.pending {
                background: #fef3c7;
                color: #92400e;
            }

            /* 代理配置样式 */
            .proxy-input-row {
                display: flex;
                gap: 12px;
                align-items: center;
            }
            .proxy-input-row input {
                flex: 1;
                padding: 10px 14px;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                font-size: 0.9rem;
            }
            .proxy-input-row input:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }
            .proxy-options-row {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                margin-top: 12px;
                color: #374151;
                font-size: 0.9rem;
            }
            .proxy-options-row input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin-top: 2px;
                accent-color: #667eea;
                flex: 0 0 auto;
            }
            .proxy-option-text {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .proxy-option-title {
                font-weight: 500;
                color: #1f2937;
            }
            .proxy-option-desc {
                color: #6b7280;
                font-size: 0.8rem;
                line-height: 1.4;
            }
        </style>
        <script defer src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" onload="window.__copilotEchartsReady && window.__copilotEchartsReady()"></script>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>GitHub Copilot 管理面板</h1>
                <div class="header-right">
                    <span id="header-status">加载中...</span>
                </div>
            </header>

            <div id="mainContent">
                <div class="empty-state">
                    <div class="loading"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <div id="toast" class="toast"></div>

        <script>
            const API_BASE = '/copilotFE';
            let authPollTimer = null;
            let authPolling = false;
            let apiKeyVisible = false;
            let apiKeyPlain = '';
            let apiKeyMasked = '';
            let currentMonth = '';
            let apiCallsChartInstance = null;
            let tokensChartInstance = null;
            let statsAutoRefreshTimer = null;
            let lastDailyChartData = null;

            function disposeChartInstances() {
                for (const chart of [apiCallsChartInstance, tokensChartInstance]) {
                    try {
                        if (chart && typeof chart.dispose === 'function') chart.dispose();
                    } catch {}
                }
                apiCallsChartInstance = null;
                tokensChartInstance = null;
            }

            window.__copilotEchartsReady = function () {
                if (lastDailyChartData && currentMonth) {
                    disposeChartInstances();
                    renderCharts(lastDailyChartData, currentMonth);
                }
            };

            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = 'toast ' + type;
                toast.classList.add('show');
                const duration = type === 'error' ? 8000 : 3000;
                setTimeout(() => toast.classList.remove('show'), duration);
            }

            async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 45000) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, {...options, signal: controller.signal});
                    let data = null;
                    try {
                        data = await response.json();
                    } catch {}
                    if (!response.ok) {
                        throw new Error(data?.error || data?.message || `HTTP ${response.status}`);
                    }
                    return data || {};
                } catch (error) {
                    if (error.name === 'AbortError') {
                        throw new Error('请求超时，请检查代理配置');
                    }
                    throw error;
                } finally {
                    clearTimeout(timer);
                }
            }

            async function loadStatus() {
                try {
                    const response = await fetch(API_BASE + '/status');
                    const data = await response.json();

                    document.getElementById('header-status').textContent = data.authenticated
                        ? `已认证: ${data.userInfo?.login || 'unknown'}`
                        : '未认证';

                    apiKeyMasked = data.apiKeyPrefix || '****';
                    apiKeyPlain = data.apiKeyPlain || '';
                    apiKeyVisible = false;

                    renderPage(data);
                    startStatsAutoRefresh();
                    currentMonth = getCurrentMonth();
                    loadAvailableMonths();
                    await loadDailyChartData();
                } catch (error) {
                    showToast('加载信息失败: ' + error.message, 'error');
                }
            }

            function formatStat(n) {
                if (n >= 100000000) return (n / 100000000).toFixed(2) + '亿';
                if (n >= 10000) return (n / 10000).toFixed(2) + '万';
                return new Intl.NumberFormat('zh-CN').format(n);
            }

            function formatNumber(n) {
                return new Intl.NumberFormat('zh-CN').format(n);
            }

            function getCurrentMonth() {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            }

            function loadAvailableMonths() {
                const select = document.getElementById('monthSelect');
                if (!select) return;
                const now = new Date();
                const months = [];
                for (let i = 0; i < 3; i++) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    months.push(key);
                }
                select.innerHTML = months
                    .map((m) => {
                        const [y, mo] = m.split('-');
                        return `<option value="${m}"${m === currentMonth ? ' selected' : ''}>${y} - ${parseInt(mo)}月</option>`;
                    })
                    .join('');
            }

            async function onMonthChange() {
                const select = document.getElementById('monthSelect');
                if (select) {
                    currentMonth = select.value;
                }
                await loadDailyChartData();
            }

            async function loadDailyChartData() {
                if (!currentMonth) return;
                try {
                    const response = await fetch(`/copilotFE/stats/daily?month=${currentMonth}`);
                    const result = await response.json();
                    lastDailyChartData = result.data || {};
                    renderCharts(lastDailyChartData, currentMonth);
                } catch (error) {
                    console.error('加载每日数据失败:', error);
                }
            }

            function getDaysInMonth(monthKey) {
                const [year, month] = monthKey.split('-').map(Number);
                return new Date(year, month, 0).getDate();
            }

            function fallbackAxisLabels(dates, chartWidth, left, right, y) {
                if (!dates.length) return '';
                const indexes = dates.length <= 2
                    ? dates.map((_, i) => i)
                    : [0, Math.floor((dates.length - 1) / 2), dates.length - 1];
                return indexes
                    .filter((index, pos, arr) => arr.indexOf(index) === pos)
                    .map((index) => {
                        const x = dates.length === 1
                            ? (left + chartWidth - right) / 2
                            : left + (index / (dates.length - 1)) * (chartWidth - left - right);
                        return `<text x="${x.toFixed(1)}" y="${y}" text-anchor="middle" fill="#9ca3af" font-size="11">${dates[index]}</text>`;
                    })
                    .join('');
            }

            function fallbackEmptyChart(title) {
                return `
                    <div class="chart-fallback">
                        <div class="chart-fallback-title">${title}</div>
                        <div class="chart-fallback-empty">暂无数据</div>
                    </div>
                `;
            }

            function fallbackLineChart(title, dates, values, color) {
                if (!dates.length) return fallbackEmptyChart(title);
                const width = 720;
                const height = 220;
                const left = 46;
                const right = 18;
                const top = 16;
                const bottom = 32;
                const maxValue = Math.max(1, ...values);
                const xFor = (index) => dates.length === 1
                    ? (left + width - right) / 2
                    : left + (index / (dates.length - 1)) * (width - left - right);
                const yFor = (value) => height - bottom - (value / maxValue) * (height - top - bottom);
                const points = values.map((value, index) => `${xFor(index).toFixed(1)},${yFor(value).toFixed(1)}`).join(' ');
                const areaPoints = `${left},${height - bottom} ${points} ${width - right},${height - bottom}`;
                return `
                    <div class="chart-fallback">
                        <div class="chart-fallback-title">${title}</div>
                        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="${title}">
                            <line x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" stroke="#e5e7eb" />
                            <line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" stroke="#e5e7eb" />
                            <text x="${left - 8}" y="${top + 4}" text-anchor="end" fill="#9ca3af" font-size="11">${formatStat(maxValue)}</text>
                            <text x="${left - 8}" y="${height - bottom + 4}" text-anchor="end" fill="#9ca3af" font-size="11">0</text>
                            <polygon points="${areaPoints}" fill="${color}" opacity="0.12"></polygon>
                            <polyline points="${points}" fill="none" stroke="${color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
                            ${fallbackAxisLabels(dates, width, left, right, height - 10)}
                        </svg>
                    </div>
                `;
            }

            function fallbackStackedBarChart(title, dates, cacheHitData, uncachedInputData, outputData) {
                if (!dates.length) return fallbackEmptyChart(title);
                const width = 720;
                const height = 220;
                const left = 52;
                const right = 18;
                const top = 16;
                const bottom = 32;
                const totals = dates.map((_, index) => (cacheHitData[index] || 0) + (uncachedInputData[index] || 0) + (outputData[index] || 0));
                const maxValue = Math.max(1, ...totals);
                const plotWidth = width - left - right;
                const gap = Math.max(2, Math.min(8, plotWidth / Math.max(1, dates.length) * 0.25));
                const barWidth = Math.max(3, (plotWidth - gap * Math.max(0, dates.length - 1)) / Math.max(1, dates.length));
                const yFor = (value) => height - bottom - (value / maxValue) * (height - top - bottom);
                const bars = dates.map((_, index) => {
                    const x = left + index * (barWidth + gap);
                    let topY = height - bottom;
                    const segments = [
                        {value: cacheHitData[index] || 0, color: '#a0dcfd'},
                        {value: uncachedInputData[index] || 0, color: '#60b3fe'},
                        {value: outputData[index] || 0, color: '#0c70f3'}
                    ];
                    return segments.map((segment) => {
                        const nextY = yFor((height - bottom - topY) / (height - top - bottom) * maxValue + segment.value);
                        const rectHeight = Math.max(0, topY - nextY);
                        topY = nextY;
                        return `<rect x="${x.toFixed(1)}" y="${nextY.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${rectHeight.toFixed(1)}" fill="${segment.color}" rx="2"></rect>`;
                    }).join('');
                }).join('');
                return `
                    <div class="chart-fallback">
                        <div class="chart-fallback-title">${title}</div>
                        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="${title}">
                            <line x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" stroke="#e5e7eb" />
                            <line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" stroke="#e5e7eb" />
                            <text x="${left - 8}" y="${top + 4}" text-anchor="end" fill="#9ca3af" font-size="11">${formatStat(maxValue)}</text>
                            <text x="${left - 8}" y="${height - bottom + 4}" text-anchor="end" fill="#9ca3af" font-size="11">0</text>
                            ${bars}
                            ${fallbackAxisLabels(dates, width, left, right, height - 10)}
                        </svg>
                    </div>
                `;
            }

            function renderFallbackCharts(dates, apiCallsData, inputTokensData, outputTokensData, cacheHitTokensData) {
                const apiCallsEl = document.getElementById('apiCallsChart');
                const tokensEl = document.getElementById('tokensChart');
                const uncachedInputData = inputTokensData.map((value, index) => Math.max(0, value - (cacheHitTokensData[index] || 0)));
                if (apiCallsEl) apiCallsEl.innerHTML = fallbackLineChart('API 请求次数', dates, apiCallsData, '#667eea');
                if (tokensEl) tokensEl.innerHTML = fallbackStackedBarChart('Tokens 使用量', dates, cacheHitTokensData, uncachedInputData, outputTokensData);
            }

            function renderCharts(dailyData, monthKey) {
                let daysInMonth = getDaysInMonth(monthKey);
                const now = new Date();
                const curMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                if (monthKey === curMonth) {
                    daysInMonth = Math.min(daysInMonth, now.getDate());
                }
                const dates = [];
                const apiCallsData = [];
                const inputTokensData = [];
                const outputTokensData = [];
                const cacheHitTokensData = [];

                for (let d = 1; d <= daysInMonth; d++) {
                    const dayKey = String(d).padStart(2, '0');
                    const dayData = dailyData[dayKey] || {
                        api_calls: 0,
                        input_tokens: 0,
                        output_tokens: 0,
                        cache_hit_tokens: 0
                    };
                    dates.push(d);

            // ==================== GitHub 认证 ====================

            async function startAuth() {
                const el = document.getElementById('auth-section');
                try {
                    if (authPollTimer) {
                        clearTimeout(authPollTimer);
                        authPollTimer = null;
                    }
                    authPolling = false;
                    el.innerHTML = `<div class="auth-box"><div class="loading"></div> <span>正在保存代理配置...</span></div>`;
                    await persistProxyConfig({showSuccess: false});

                    el.innerHTML = `<div class="auth-box"><div class="loading"></div> <span>正在获取设备码...</span></div>`;
                    const data = await fetchJsonWithTimeout(`${API_BASE}/auth/start`, {}, 24000);
                    if (!data.success) throw new Error(data.error || '获取设备码失败');
                    el.innerHTML = `
                        <div class="auth-box active">
                            <p style="margin-bottom:8px; color:#374151;">请在浏览器中打开以下链接，并输入设备码完成授权</p>
                            <div class="auth-code" id="user-code">${data.user_code}</div>
                            <br/>
                            <a class="auth-link" href="${data.verification_uri}" target="_blank">${data.verification_uri}</a>
                            <p style="margin-top:12px; font-size:0.85rem; color:#6b7280;">
                                <span class="loading"></span> 等待授权中...
                            </p>
                            <button class="btn btn-secondary btn-small" style="margin-top:8px;" onclick="cancelAuth()">取消</button>
                        </div>
                    `;
                    try {
                        await navigator.clipboard.writeText(data.user_code);
                    } catch {}
                    startAuthPoll(data.device_code, data.interval);
                } catch (error) {
                    showToast('获取设备码失败: ' + error.message, 'error');
                    loadStatus();
                }
            }

            function startAuthPoll(deviceCode, interval) {
                authPolling = true;
                let pollInterval = (interval || 5) * 1000;

                const poll = async () => {
                    if (!authPolling) return;
                    try {
                        const result = await fetchJsonWithTimeout(`${API_BASE}/auth/poll`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({device_code: deviceCode})
                        }, 24000);
                        if (result.status === 'success') {
                            authPolling = false;
                            showToast('认证成功！');
                            loadStatus();
                        } else if (result.status === 'pending') {
                            authPollTimer = setTimeout(poll, pollInterval);
                        } else if (result.status === 'slow_down') {
                            pollInterval = (result.interval || 10) * 1000;
                            authPollTimer = setTimeout(poll, pollInterval);
                        } else if (result.status === 'expired') {
                            authPolling = false;
                            showToast('设备码已过期，请重新认证', 'error');
                            loadStatus();
                        } else if (result.status === 'denied') {
                            authPolling = false;
                            showToast('用户拒绝授权', 'error');
                            loadStatus();
                        } else {
                            authPolling = false;
                            showToast('认证失败: ' + (result.message || '未知错误'), 'error');
                            loadStatus();
                        }
                    } catch (error) {
                        authPolling = false;
                        showToast('认证失败: ' + error.message, 'error');
                        loadStatus();
                    }
                };

                poll();
            }

            function cancelAuth() {
                authPolling = false;
                if (authPollTimer) {
                    clearTimeout(authPollTimer);
                    authPollTimer = null;
                }
                loadStatus();
            }

            async function handleLogout() {

            async function copyApiKey() {
                const keyToCopy = apiKeyPlain || apiKeyMasked;
                if (!keyToCopy || keyToCopy === '****') {
                    showToast('无可复制的 API Key', 'error');
                    return;
                }
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(keyToCopy);
                    } else {
                        const textarea = document.createElement('textarea');
                        textarea.value = keyToCopy;
                        textarea.style.cssText = 'position:fixed;left:-9999px;opacity:0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                    }
                    const btn = document.getElementById('copyKeyBtn');
                    btn.textContent = '✓';
                    btn.classList.add('copy-success');
                    showToast('API Key 已复制');
                    setTimeout(() => {
                        btn.textContent = '📋';
                        btn.classList.remove('copy-success');
                    }, 2000);
                } catch (error) {
                    showToast('复制失败', 'error');
                }
            }

            async function resetApiKey() {
                if (!confirm('重置后旧 Key 将立即失效，确定？')) return;
                try {
                    const response = await fetch(`/copilotFE/apikey/regenerate`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (data.api_key) {
                        apiKeyPlain = data.api_key;
                        const body = apiKeyPlain.slice('sk-'.length);
                        apiKeyMasked = 'sk-' + body.slice(0, 8) + '****' + body.slice(-4);
                        apiKeyVisible = true;
                        document.getElementById('apiKeyText').textContent = apiKeyPlain;
                        document.getElementById('toggleKeyBtn').textContent = '🙈';
                        showToast('API Key 已重置，请妥善保存');
                    } else {
                        throw new Error(data.error || '重置失败');
                    }
                } catch (error) {
                    showToast('重置失败: ' + error.message, 'error');
                }
            }

            // ==================== 使用指南 ====================

            function getBaseUrl() {
                return window.location.origin;
            }

            function updateGuideConfig() {
                const baseUrl = getBaseUrl();
                const el = document.getElementById('guideConfigCode');
                if (!el) return;
                el.textContent = `{
    "env": {
        "ANTHROPIC_AUTH_TOKEN": "${apiKeyPlain || apiKeyMasked}",
        "ANTHROPIC_BASE_URL": "${baseUrl}/copilot/anthropic",
        "ANTHROPIC_DEFAULT_HAIKU_MODEL": "haiku",
        "ANTHROPIC_DEFAULT_SONNET_MODEL": "sonnet",
        "ANTHROPIC_DEFAULT_OPUS_MODEL": "opus"
      }
}`;
                const openaiUrlEl = document.getElementById('guideOpenAIUrl');
                if (openaiUrlEl) {
                    openaiUrlEl.textContent = `${baseUrl}/copilot/v1`;
                }
                const responsesUrlEl = document.getElementById('guideResponsesUrl');
                if (responsesUrlEl) {
                    responsesUrlEl.textContent = `${baseUrl}/copilot/v1`;
                }
            }

            function copyGuideConfig() {
                const el = document.getElementById('guideConfigCode');
                if (!el) return;
                copyText(el.textContent);
            }

            function copyGuideOpenAIUrl() {
                const el = document.getElementById('guideOpenAIUrl');
                if (!el) return;
                copyText(el.textContent);
            }

            function copyGuideResponsesUrl() {
                const el = document.getElementById('guideResponsesUrl');
                if (!el) return;
                copyText(el.textContent);
            }

            function copyText(text) {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(text);
                    } else {
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.style.cssText = 'position:fixed;left:-9999px;opacity:0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                    }
                    showToast('已复制');
                } catch {
                    showToast('复制失败', 'error');
                }
            }

            // ==================== 代理配置 ====================

            function getProxyFormConfig() {
                const proxyUrl = document.getElementById('proxyUrl')?.value.trim() || '';
                const skipTlsVerify = document.getElementById('skipTlsVerify')?.checked === true;
                return {proxy: proxyUrl, skip_tls_verify: skipTlsVerify};
            }

            async function persistProxyConfig({showSuccess = true} = {}) {
                const config = getProxyFormConfig();
                const data = await fetchJsonWithTimeout(`${API_BASE}/proxy`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                }, 15000);
                if (data.message) {
                    if (showSuccess) {
                        showToast('代理配置已保存');
                    }
                    return data;
                }
                throw new Error(data.error || '保存失败');
            }

            async function saveProxy() {
                try {
                    await persistProxyConfig();
                } catch (error) {
                    showToast('保存失败: ' + error.message, 'error');
                }
            }

            // ==================== 窗口大小调整 ====================

            window.addEventListener('resize', function () {
                try {
                    if (apiCallsChartInstance) apiCallsChartInstance.resize();
                    if (tokensChartInstance) tokensChartInstance.resize();
                } catch {}
            });

            // ==================== 初始化 ====================

            loadStatus();
        </script>
    </body>
</html>
