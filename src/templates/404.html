<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - Claude API Proxy</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111f;
            --panel: rgba(14, 25, 43, .92);
            --line: rgba(148, 163, 184, .17);
            --muted: #8ea1ba;
            --text: #edf4ff;
            --brand: #7c9cff;
            --brand-2: #53d7c4;
            --shadow: 0 30px 90px rgba(0, 0, 0, .35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 8%, rgba(83, 215, 196, .14), transparent 30rem),
                radial-gradient(circle at 92% 4%, rgba(124, 156, 255, .2), transparent 34rem),
                var(--bg);
            font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        button, a { font: inherit; }
        .card {
            position: relative;
            width: min(720px, 100%);
            overflow: hidden;
            padding: clamp(28px, 6vw, 56px);
            border: 1px solid var(--line);
            border-radius: 26px;
            background: linear-gradient(155deg, rgba(18, 32, 54, .97), rgba(11, 21, 37, .96));
            box-shadow: var(--shadow);
        }
        .card::before {
            content: "404";
            position: absolute;
            right: -18px;
            top: -54px;
            color: rgba(124, 156, 255, .075);
            font-size: clamp(150px, 32vw, 260px);
            font-weight: 950;
            letter-spacing: -.09em;
            line-height: 1;
            pointer-events: none;
        }
        .brand { display: flex; align-items: center; gap: 12px; position: relative; }
        .logo {
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            border-radius: 13px;
            color: #07101c;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            font-weight: 900;
            box-shadow: 0 12px 36px rgba(83, 215, 196, .2);
        }
        .brand strong, .brand span { display: block; }
        .brand strong { font-size: 15px; }
        .brand span { color: var(--muted); font-size: 12px; }
        .content { position: relative; max-width: 520px; margin-top: clamp(62px, 12vw, 112px); }
        .code {
            display: inline-flex;
            padding: 5px 10px;
            border: 1px solid rgba(124, 156, 255, .28);
            border-radius: 999px;
            color: #b9c8ff;
            background: rgba(124, 156, 255, .08);
            font-size: 12px;
            font-weight: 800;
        }
        h1 {
            margin: 18px 0 12px;
            font-size: clamp(34px, 7vw, 58px);
            line-height: 1.04;
            letter-spacing: -.055em;
        }
        p { margin: 0; color: var(--muted); font-size: 16px; }
        .path {
            display: block;
            max-width: 100%;
            margin-top: 20px;
            padding: 11px 13px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 11px;
            color: #b8c8ff;
            background: rgba(5, 14, 26, .7);
            font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
        .btn {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border: 1px solid var(--line);
            border-radius: 11px;
            color: var(--text);
            background: #17263e;
            text-decoration: none;
            cursor: pointer;
            transition: transform .18s, border-color .18s;
        }
        .btn:hover { transform: translateY(-1px); border-color: rgba(124, 156, 255, .55); }
        .btn-primary {
            border: 0;
            color: #07111e;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            font-weight: 850;
        }
        @media (max-width: 520px) {
            .card { padding: 26px 22px; }
            .content { margin-top: 76px; }
            .actions { display: grid; }
        }
    </style>
</head>
<body>
<main class="card">
    <div class="brand">
        <div class="logo">C</div>
        <div><strong>Claude API Proxy</strong><span>统一服务控制台</span></div>
    </div>
    <section class="content">
        <span class="code">HTTP 404</span>
        <h1>这个页面不存在。</h1>
        <p>地址可能已被移动、删除，或者输入有误。你可以返回控制台继续操作。</p>
        <code class="path" id="requestedPath"></code>
        <div class="actions">
            <a class="btn btn-primary" href="/">返回控制台</a>
            <button class="btn" type="button" onclick="history.back()">返回上一页</button>
        </div>
    </section>
</main>
<script>
document.getElementById('requestedPath').textContent=location.pathname+location.search;
</script>
</body>
</html>
